# Render Blueprint for AutoMech - Full Stack Deployment
# This deploys both frontend and backend on a single Render service

services:
  # Full Stack Web Service (Backend + Frontend)
  - type: web
    name: automech-fullstack
    runtime: python
    region: singapore
    plan: free
    branch: main
    buildCommand: bash render-fullstack-build.sh
    startCommand: bash start-server.sh
    envVars:
      - key: PREFER_CLOUD_LLM
        value: true
      - key: GROQ_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NODE_VERSION
        value: 18.x
    healthCheckPath: /

  # PostgreSQL Database (Optional)
  # Uncomment to add database
  # - type: pgsql
  #   name: automech-db
  #   region: singapore
  #   plan: free
  #   databaseName: automech
  #   databaseUser: automech
